<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Magic Dashboard | Analytics</title>
  <meta name="description"
    content="A futuristic cosmic analytics dashboard with glassmorphism, neon glow effects, and 3D interactive elements." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="pages.css" />
</head>

<body>
  <!-- ====== STAR FIELD CANVAS ====== -->
  <canvas id="starfield"></canvas>

  <!-- ====== SIDEBAR ====== -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" width="36" height="36">
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#a855f7" />
              <stop offset="100%" stop-color="#06b6d4" />
            </linearGradient>
          </defs>
          <circle cx="20" cy="20" r="16" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" />
          <circle cx="20" cy="20" r="6" fill="url(#logoGrad)" opacity="0.8" />
          <circle cx="20" cy="12" r="2.5" fill="#a855f7" />
          <circle cx="27" cy="24" r="2.5" fill="#06b6d4" />
          <circle cx="13" cy="24" r="2.5" fill="#e879f9" />
        </svg>
      </div>
      <a href="index.html" style="text-decoration:none;"><span class="logo-text">CosmicDash</span></a>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item active" data-tooltip="Dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="quantumica.html" class="nav-item" data-tooltip="Quantumica">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
        </svg>
        <span class="nav-label" style="color:#06b6d4; text-shadow:0 0 10px rgba(6,182,212,0.5);">Quantumica</span>
      </a>
      <a href="analytics.html" class="nav-item" data-tooltip="Analytics">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
        <span class="nav-label">Analytics</span>
      </a>
      <a href="users.html" class="nav-item" data-tooltip="Users">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <span class="nav-label">Users</span>
      </a>
      <a href="#" class="nav-item" data-tooltip="Revenue">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23" />
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
        </svg>
        <span class="nav-label">Revenue</span>
      </a>
      <a href="#" class="nav-item" data-tooltip="Reports">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
        </svg>
        <span class="nav-label">Reports</span>
      </a>
      <a href="#" class="nav-item" data-tooltip="Galaxies">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
          <path d="M2 12h20" />
        </svg>
        <span class="nav-label">Galaxies</span>
      </a>
      <a href="settings.html" class="nav-item" data-tooltip="Settings">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
        <span class="nav-label">Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="index.html" class="nav-item" data-tooltip="Logout">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span class="nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <!-- ====== MAIN WRAPPER ====== -->
  <div id="main-wrapper" class="main-wrapper">
    <!-- ====== HEADER ====== -->
    <header class="top-header">
      <div class="header-left">
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Sidebar">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="search-container">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="search-input" type="text" class="search-input" placeholder="Search the cosmos..."
            autocomplete="off" />
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn notification-btn" aria-label="Notifications">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="notif-badge">5</span>
        </button>
        <div class="profile-wrapper">
          <div class="profile-avatar" id="profile-avatar">
            <img
              src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23a855f7'/%3E%3Cstop offset='100%25' stop-color='%2306b6d4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='40' cy='40' r='40' fill='url(%23g)'/%3E%3Ctext x='40' y='46' font-family='Inter,sans-serif' font-size='28' font-weight='700' fill='white' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E"
              alt="User Avatar" width="40" height="40" />
            <span class="avatar-ring"></span>
          </div>
          <div class="profile-info">
            <span class="profile-name">Cosmic User</span>
            <span class="profile-role">Admin</span>
          </div>
        </div>
      </div>
    </header>

    <!-- ====== MAIN CONTENT ====== -->
    <main class="main-content">
      <!-- KPI CARDS ROW -->
      <section class="kpi-row">
        <article class="kpi-card" id="kpi-revenue">
          <div class="kpi-icon-wrap purple">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8">
              <line x1="12" y1="1" x2="12" y2="23" />
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
          </div>
          <div class="kpi-data">
            <span class="kpi-label">Total Revenue</span>
            <span class="kpi-value" data-target="284930">$0</span>
            <span class="kpi-change positive">+18.2%</span>
          </div>
        </article>
        <article class="kpi-card" id="kpi-users">
          <div class="kpi-icon-wrap cyan">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          </div>
          <div class="kpi-data">
            <span class="kpi-label">Active Users</span>
            <span class="kpi-value" data-target="42750">0</span>
            <span class="kpi-change positive">+7.4%</span>
          </div>
        </article>
        <article class="kpi-card" id="kpi-sessions">
          <div class="kpi-icon-wrap magenta">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
          </div>
          <div class="kpi-data">
            <span class="kpi-label">Sessions</span>
            <span class="kpi-value" data-target="128400">0</span>
            <span class="kpi-change positive">+12.1%</span>
          </div>
        </article>
        <article class="kpi-card" id="kpi-conversion">
          <div class="kpi-icon-wrap mixed">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </div>
          <div class="kpi-data">
            <span class="kpi-label">Conversion</span>
            <span class="kpi-value" data-target="3.24" data-suffix="%" data-decimals="2">0%</span>
            <span class="kpi-change negative">-0.5%</span>
          </div>
        </article>
      </section>

      <!-- CHART + ACTIVITY FEED -->
      <section class="content-grid">
        <!-- CHART PANEL -->
        <div class="chart-panel glass-panel">
          <div class="panel-header">
            <h2 class="panel-title">Cosmic Traffic Overview</h2>
            <div class="chart-controls">
              <button class="chart-btn active" data-range="7d">7D</button>
              <button class="chart-btn" data-range="30d">30D</button>
              <button class="chart-btn" data-range="90d">90D</button>
              <button class="chart-btn" data-range="1y">1Y</button>
            </div>
          </div>
          <div class="chart-wrapper">
            <canvas id="main-chart"></canvas>
          </div>
        </div>

        <!-- ACTIVITY FEED -->
        <div class="activity-panel glass-panel">
          <div class="panel-header">
            <h2 class="panel-title">Recent Cosmic Activity</h2>
            <button class="see-all-btn">View All</button>
          </div>
          <div class="activity-feed" id="activity-feed">
            <!-- JS populated -->
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script src="pages.js"></script>
</body>

</html>
